<script>
const API_URL = "PASTE_YOUR_GOOGLE_SCRIPT_WEBAPP_URL_HERE";

let charts = {};

async function loadDashboardData() {
  try {

    const response = await fetch(API_URL);
    const result = await response.json();

    const sales = result.sales || [];
    const purchase = result.purchase || [];
    const expense = result.expense || [];
    const payment = result.payment || [];

    updateKPIs(sales, purchase, expense, payment);

    renderSalesTable(sales);
    renderPurchaseTable(purchase);
    renderExpenseTable(expense);
    renderPaymentTable(payment);

    renderCharts(sales, purchase, expense);

  } catch (err) {
    console.log("Dashboard Error:", err);
  }
}

function amount(qty, rate, gst = 0){
  return (Number(qty || 0) * Number(rate || 0)) * (1 + Number(gst || 0)/100);
}

function updateKPIs(sales, purchase, expense, payment){

  const totalSales = sales.reduce((s,x)=>s+amount(x.Qty,x.Rate,x.GST),0);

  const totalPurchase = purchase.reduce((s,x)=>s+amount(x.Qty,x.Rate,x.GST),0);

  const totalExpense = expense.reduce((s,x)=>s+Number(x.Amount||0),0);

  const received = payment
    .filter(x => (x.Type || "").toLowerCase() === "received")
    .reduce((s,x)=>s+Number(x.Amount||0),0);

  const paid = payment
    .filter(x => (x.Type || "").toLowerCase() === "paid")
    .reduce((s,x)=>s+Number(x.Amount||0),0);

  const profit = totalSales-totalPurchase-totalExpense;

  const outstanding = (totalSales-received)+(totalPurchase-paid);

  document.getElementById("kpi-sales").innerText =
    "₹"+totalSales.toLocaleString("en-IN");

  document.getElementById("kpi-purchase").innerText =
    "₹"+totalPurchase.toLocaleString("en-IN");

  document.getElementById("kpi-expense").innerText =
    "₹"+totalExpense.toLocaleString("en-IN");

  document.getElementById("kpi-profit").innerText =
    "₹"+profit.toLocaleString("en-IN");

  document.getElementById("kpi-outstanding").innerText =
    "₹"+outstanding.toLocaleString("en-IN");

  document.getElementById("amount-received").innerText =
    "₹"+received.toLocaleString("en-IN");

  document.getElementById("amount-paid").innerText =
    "₹"+paid.toLocaleString("en-IN");

  document.getElementById("net-cash").innerText =
    "₹"+(received-paid).toLocaleString("en-IN");

  document.getElementById("receivables").innerText =
    "₹"+(totalSales-received).toLocaleString("en-IN");

  document.getElementById("payables").innerText =
    "₹"+(totalPurchase-paid).toLocaleString("en-IN");

}

function renderSalesTable(data){

  document.getElementById("sales-table").innerHTML =
  data.map(x=>`
    <tr class="border-b">
      <td class="px-4 py-2">${x.Date || ''}</td>
      <td class="px-4 py-2">${x.Customer || ''}</td>
      <td class="px-4 py-2">${x.Product || ''}</td>
      <td class="px-4 py-2 text-right">${x.Qty || 0}</td>
      <td class="px-4 py-2 text-right">₹${x.Rate || 0}</td>
      <td class="px-4 py-2 text-right font-bold text-green-700">
      ₹${amount(x.Qty,x.Rate,x.GST).toLocaleString("en-IN")}
      </td>
      <td class="px-4 py-2">${x.City || ''}</td>
    </tr>
  `).join('');

}

function renderPurchaseTable(data){

  document.getElementById("purchase-table").innerHTML =
  data.map(x=>`
    <tr class="border-b">
      <td class="px-4 py-2">${x.Date || ''}</td>
      <td class="px-4 py-2">${x.Supplier || ''}</td>
      <td class="px-4 py-2">${x.Product || ''}</td>
      <td class="px-4 py-2 text-right">${x.Qty || 0}</td>
      <td class="px-4 py-2 text-right">₹${x.Rate || 0}</td>
      <td class="px-4 py-2 text-right font-bold text-blue-700">
      ₹${amount(x.Qty,x.Rate,x.GST).toLocaleString("en-IN")}
      </td>
    </tr>
  `).join('');

}

function renderExpenseTable(data){

  document.getElementById("expense-table").innerHTML =
  data.map(x=>`
    <tr class="border-b">
      <td class="px-4 py-2">${x.Date || ''}</td>
      <td class="px-4 py-2">${x.Category || ''}</td>
      <td class="px-4 py-2">${x.Description || ''}</td>
      <td class="px-4 py-2 text-right font-bold text-orange-700">
      ₹${Number(x.Amount || 0).toLocaleString("en-IN")}
      </td>
    </tr>
  `).join('');

}

function renderPaymentTable(data){

  document.getElementById("payment-table").innerHTML =
  data.map(x=>`
    <tr class="border-b">
      <td class="px-4 py-2">${x.Date || ''}</td>
      <td class="px-4 py-2">${x.Type || ''}</td>
      <td class="px-4 py-2">${x.Party || ''}</td>
      <td class="px-4 py-2 text-right font-bold text-purple-700">
      ₹${Number(x.Amount || 0).toLocaleString("en-IN")}
      </td>
      <td class="px-4 py-2">${x.Status || ''}</td>
    </tr>
  `).join('');

}

function renderCharts(sales, purchase, expense){

  // SALES TREND

  const monthlySales = {};

  sales.forEach(x=>{

    const month = new Date(x.Date)
      .toLocaleString('default',{month:'short'});

    monthlySales[month] =
      (monthlySales[month] || 0)
      + amount(x.Qty,x.Rate,x.GST);

  });

  createChart(
    "salesTrendChart",
    "line",
    Object.keys(monthlySales),
    Object.values(monthlySales),
    "#059669"
  );

  // PRODUCT PIE

  const products = {};

  sales.forEach(x=>{

    products[x.Product] =
      (products[x.Product] || 0)
      + amount(x.Qty,x.Rate,x.GST);

  });

  createPieChart(
    "productPieChart",
    Object.keys(products),
    Object.values(products)
  );

  // TOP CUSTOMERS

  const customers = {};

  sales.forEach(x=>{

    customers[x.Customer] =
      (customers[x.Customer] || 0)
      + amount(x.Qty,x.Rate,x.GST);

  });

  const topCustomers =
    Object.entries(customers)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);

  createChart(
    "topCustomersChart",
    "bar",
    topCustomers.map(x=>x[0]),
    topCustomers.map(x=>x[1]),
    "#2563eb"
  );

  // CITY SALES

  const cityData = {};

  sales.forEach(x=>{

    cityData[x.City] =
      (cityData[x.City] || 0)
      + amount(x.Qty,x.Rate,x.GST);

  });

  createChart(
    "citySalesChart",
    "bar",
    Object.keys(cityData),
    Object.values(cityData),
    "#f59e0b"
  );

  // PURCHASE TREND

  const monthlyPurchase = {};

  purchase.forEach(x=>{

    const month = new Date(x.Date)
      .toLocaleString('default',{month:'short'});

    monthlyPurchase[month] =
      (monthlyPurchase[month] || 0)
      + amount(x.Qty,x.Rate,x.GST);

  });

  createChart(
    "purchaseTrendChart",
    "line",
    Object.keys(monthlyPurchase),
    Object.values(monthlyPurchase),
    "#2563eb"
  );

  // EXPENSE CHART

  const expenseCat = {};

  expense.forEach(x=>{

    expenseCat[x.Category] =
      (expenseCat[x.Category] || 0)
      + Number(x.Amount || 0);

  });

  createPieChart(
    "expenseChart",
    Object.keys(expenseCat),
    Object.values(expenseCat)
  );

}

function createChart(id,type,labels,data,color){

  if(charts[id]){
    charts[id].destroy();
  }

  charts[id] = new Chart(
    document.getElementById(id),
    {
      type:type,
      data:{
        labels:labels,
        datasets:[{
          data:data,
          borderColor:color,
          backgroundColor:color+"33",
          fill:true,
          borderWidth:3,
          tension:0.4
        }]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false
      }
    }
  );

}

function createPieChart(id,labels,data){

  if(charts[id]){
    charts[id].destroy();
  }

  charts[id] = new Chart(
    document.getElementById(id),
    {
      type:"doughnut",
      data:{
        labels:labels,
        datasets:[{
          data:data,
          backgroundColor:[
            "#059669",
            "#2563eb",
            "#f59e0b",
            "#dc2626",
            "#8b5cf6",
            "#06b6d4"
          ]
        }]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false
      }
    }
  );

}

// AUTO LOAD

loadDashboardData();

// AUTO REFRESH EVERY 30 SECONDS

setInterval(loadDashboardData,30000);

</script>
